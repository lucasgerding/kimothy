<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kimothy</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20% 1.5rem 0;
    }


    button {
      font-family: Arial, Helvetica, sans-serif;
      font-style: italic;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      cursor: pointer;
      padding: 0.6em 1.4em;
      backdrop-filter: blur(6px);
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      transition: background 0.2s ease, border-color 0.2s ease;
      user-select: none;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .email-form {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.6em;
    }

    .email-form.visible {
      display: flex;
    }

    .email-form input {
      font-family: Arial, Helvetica, sans-serif;
      font-style: italic;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      padding: 0.6em 1.4em;
      backdrop-filter: blur(6px);
      outline: none;
      width: min(22rem, 100%);
      text-align: center;
    }

    .email-form input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .email-form input:focus {
      border-color: rgba(255, 255, 255, 0.6);
    }

    .email-form button[type="submit"] {
      width: 100%;
    }

    video {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      object-fit: cover;
    }

    @media (max-width: 768px) {
      video { display: none; }
    }

  </style>
</head>
<body>
  <audio id="audio" src="prophecies.mp3"></audio>
  <video id="video" autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>
  <div class="overlay">
    <button id="join-btn" onclick="document.getElementById('join-btn').style.display='none'; document.getElementById('email-form').classList.add('visible'); document.getElementById('email-input').focus()">join closed beta</button>
    <form id="email-form" class="email-form" onsubmit="handleSubmit(event)">
      <input id="email-input" type="email" placeholder="your@email.com" required>
      <button type="submit">submit</button>
    </form>
  </div>
  <script>
    // Start audio on first user interaction (browser autoplay policy)
    document.addEventListener('click', () => { document.getElementById('audio').play(); }, { once: true });
    document.getElementById('audio').play().catch(() => {});

    async function handleSubmit(e) {
      e.preventDefault();
      const email = document.getElementById('email-input').value;
      const confirm = '<p style="font-family:Arial,sans-serif;font-style:italic;font-size:1.4rem;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.5)">you made the right choice</p>';
      try {
        await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
      } finally {
        document.getElementById('email-form').innerHTML = confirm;
      }
    }
  </script>
</body>
</html>
